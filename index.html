<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Love 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* LOGIN SCREEN */
#login {
  margin-top: 150px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: hotpink;
  color: white;
  cursor: pointer;
}

/* MAIN PAGE */
#main {
  display: none;
  padding: 20px;
}

h1 {
  color: hotpink;
  animation: glow 2s infinite;
}

@keyframes glow {
  0% {text-shadow: 0 0 5px hotpink;}
  50% {text-shadow: 0 0 25px red;}
  100% {text-shadow: 0 0 5px hotpink;}
}

/* FLOATING HEARTS */
.heart {
  position: fixed;
  color: red;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh);}
}

/* IMAGE STYLE */
img {
  width: 200px;
  height: 200px;
  border-radius: 20px;
  margin: 10px;
  box-shadow: 0 0 20px hotpink;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Enter Password 💖</h2>
  <input type="password" id="password" placeholder="Enter password">
  <br><br>
  <button onclick="checkPassword()">Enter</button>
</div>

<!-- MAIN CONTENT -->
<div id="main">

  <h1>I Love You ❤️</h1>
  <p>You are the most special person in my life 💕,,HEARTCODE.I just
  want you to know that i love so much.I hope you will enjoy this as much as i enjoyed making thing for you.To you heartcode-Carol..lol..love you so much.</p>

  <!-- MUSIC -->
  <audio id="bymusic" loop autoplay>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <!-- IMAGES (replace with your photos) -->
  <div>
    <img src="pic1.jpg">
    <img src="pic2.jpg">
    <img src="pic3.jpg">
     <img src="pic4.jpg">
     <img src="pic5.jpg">
     <img src="pic6.jpg">
     <img src="pic7.jpg">
  </div>

</div>

<script>
function checkPassword() {
  const pass = document.getElementById("password").value;

  if (pass === "heartcode") {
    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";
    startHearts();
  } else {
    alert("Wrong password 😢");
  }
}

/* FLOATING HEART ANIMATION */
function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }, 300);
}
</script>

</body>
</html>
